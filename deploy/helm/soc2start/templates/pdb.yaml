{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "soc2start.fullname" . }}-probo
  labels:
    {{- include "soc2start.labels" . | nindent 4 }}
    app.kubernetes.io/component: probo
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "soc2start.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: probo
{{- end }}
