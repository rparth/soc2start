apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soc2start.fullname" . }}-probo
  labels:
    {{- include "soc2start.labels" . | nindent 4 }}
data:
  PROBOD_BASE_URL: {{ include "soc2start.baseURL" . | quote }}
  API_ADDR: {{ .Values.probo.apiAddr | quote }}
  API_CORS_ALLOWED_ORIGINS: {{ .Values.probo.corsAllowedOrigins | default (include "soc2start.baseURL" .) | quote }}
  METRICS_ADDR: {{ .Values.probo.metricsAddr | quote }}
  AUTH_COOKIE_DOMAIN: {{ .Values.probo.cookieDomain | default .Values.global.domain | quote }}
  AUTH_COOKIE_SECURE: "true"
  PG_ADDR: {{ include "soc2start.pgAddr" . | quote }}
  PG_DATABASE: {{ .Values.postgres.auth.database | quote }}
  AWS_REGION: {{ .Values.aws.region | quote }}
  AWS_BUCKET: {{ .Values.aws.bucket | quote }}
  {{- if or .Values.seaweedfs.enabled .Values.aws.endpoint }}
  AWS_ENDPOINT: {{ include "soc2start.s3Endpoint" . | quote }}
  AWS_USE_PATH_STYLE: "true"
  {{- end }}
  SMTP_ADDR: {{ .Values.probo.smtp.addr | quote }}
  {{- if .Values.probo.smtp.user }}
  SMTP_USER: {{ .Values.probo.smtp.user | quote }}
  {{- end }}
  SMTP_TLS_REQUIRED: {{ .Values.probo.smtp.tlsRequired | quote }}
  MAILER_SENDER_NAME: {{ .Values.probo.mailer.senderName | quote }}
  MAILER_SENDER_EMAIL: {{ .Values.probo.mailer.senderEmail | quote }}
  CHROME_DP_ADDR: {{ include "soc2start.chromeAddr" . | quote }}
  OTEL_SDK_DISABLED: {{ .Values.probo.otelDisabled | quote }}
  {{- if .Values.probo.tracingAddr }}
  TRACING_ADDR: {{ .Values.probo.tracingAddr | quote }}
  {{- end }}
  ACME_DIRECTORY: {{ .Values.probo.acme.directory | quote }}
  ACME_EMAIL: {{ .Values.probo.acme.email | quote }}
  TRUST_CENTER_HTTP_ADDR: {{ .Values.probo.trustCenter.httpAddr | quote }}
  TRUST_CENTER_HTTPS_ADDR: {{ .Values.probo.trustCenter.httpsAddr | quote }}
