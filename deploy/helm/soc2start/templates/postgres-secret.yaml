{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soc2start.fullname" . }}-postgres
  labels:
    {{- include "soc2start.labels" . | nindent 4 }}
type: Opaque
stringData:
  PG_USERNAME: {{ .Values.postgres.auth.username | quote }}
  PG_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
{{- end }}
