{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "soc2start.fullname" . }}
  labels:
    {{- include "soc2start.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.alb.enabled }}
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.alb.scheme }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.alb.targetType }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.alb.listenPorts | quote }}
    alb.ingress.kubernetes.io/ssl-policy: {{ .Values.ingress.alb.sslPolicy }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.alb.healthcheckPath }}
    {{- if .Values.ingress.alb.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.alb.certificateArn }}
    {{- end }}
    {{- if .Values.ingress.alb.wafAclArn }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ .Values.ingress.alb.wafAclArn }}
    {{- end }}
    {{- if .Values.ingress.cloudflare.enabled }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ include "soc2start.cloudflareInboundCidrs" . | quote }}
    {{- end }}
    {{- with .Values.ingress.alb.extraAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled (not .Values.ingress.alb.enabled) }}
  tls:
    - hosts:
        - {{ include "soc2start.ingressHost" . | quote }}
      secretName: {{ include "soc2start.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ include "soc2start.ingressHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "soc2start.fullname" . }}-probo
                port:
                  name: http
{{- end }}
