apiVersion: v1
kind: Secret
metadata:
  name: {{ include "probo.fullname" . }}
  labels:
    {{- include "probo.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials
  db-password: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.postgresPassword | quote }}{{ else }}{{ required "postgresql.password is required when postgresql.enabled=false" .Values.postgresql.password | quote }}{{ end }}
  {{- if .Values.postgresql.caBundle }}
  pg-ca-bundle: {{ .Values.postgresql.caBundle | quote }}
  {{- end }}

  # S3 credentials
  s3-access-key: {{ include "probo.s3.accessKeyId" . | quote }}
  s3-secret-key: {{ include "probo.s3.secretAccessKey" . | quote }}

  # Application secrets
  encryption-key: {{ include "probo.requireBase64Key32" (dict "name" "probo.encryptionKey" "value" .Values.probo.encryptionKey) | quote }}
  cookie-secret: {{ include "probo.requireBase64Key32" (dict "name" "probo.auth.cookieSecret" "value" .Values.probo.auth.cookieSecret) | quote }}
  password-pepper: {{ include "probo.requireBase64Key32" (dict "name" "probo.auth.passwordPepper" "value" .Values.probo.auth.passwordPepper) | quote }}
  oauth2-signing-key: {{ include "probo.requirePEMPrivateKey" (dict "name" "probo.oauth2.signingKey" "value" .Values.probo.oauth2.signingKey) | quote }}
  trust-token-secret: {{ include "probo.requireBase64Key32" (dict "name" "probo.trustAuth.tokenSecret" "value" .Values.probo.trustAuth.tokenSecret) | quote }}
  {{- if .Values.probo.customDomains.acme.accountKey }}
  acme-account-key: {{ include "probo.requirePEMPrivateKey" (dict "name" "probo.customDomains.acme.accountKey" "value" .Values.probo.customDomains.acme.accountKey) | quote }}
  {{- end }}

  # Optional SMTP credentials
  {{- if .Values.probo.mailer.smtp.user }}
  smtp-user: {{ .Values.probo.mailer.smtp.user | quote }}
  {{- end }}
  {{- if .Values.probo.mailer.smtp.password }}
  smtp-password: {{ .Values.probo.mailer.smtp.password | quote }}
  {{- end }}
  {{- if .Values.probo.mailer.resend.apiKey }}
  resend-api-key: {{ .Values.probo.mailer.resend.apiKey | quote }}
  {{- end }}

  # Optional OpenAI API key
  {{- if .Values.probo.openai.apiKey }}
  openai-api-key: {{ .Values.probo.openai.apiKey | quote }}
  {{- end }}

  # Optional Firecrawl API key (agent tools)
  {{- if .Values.probo.agentTools.firecrawlApiKey }}
  firecrawl-api-key: {{ .Values.probo.agentTools.firecrawlApiKey | quote }}
  {{- end }}

  # Optional SAML secrets
  {{- if and .Values.probo.saml.enabled .Values.probo.saml.certificate }}
  saml-certificate: {{ .Values.probo.saml.certificate | quote }}
  {{- end }}
  {{- if and .Values.probo.saml.enabled .Values.probo.saml.privateKey }}
  saml-private-key: {{ .Values.probo.saml.privateKey | quote }}
  {{- end }}

  # Optional Connector secrets
  {{- range .Values.probo.connectors }}
  {{- if eq .name "slack" }}
  {{- if .config.clientId }}
  connector-slack-client-id: {{ .config.clientId | quote }}
  {{- end }}
  {{- if .config.clientSecret }}
  connector-slack-client-secret: {{ .config.clientSecret | quote }}
  {{- end }}
  {{- if .config.signingSecret }}
  connector-slack-signing-secret: {{ .config.signingSecret | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
